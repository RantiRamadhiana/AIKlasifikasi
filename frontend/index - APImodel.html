<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>AI Content Classification</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen">
  <!-- HEADER -->
  <div class="w-full bg-slate-900 shadow-lg">
    <div class="max-w-6xl mx-auto px-6 py-5">
      <h1 class="text-3xl font-bold text-white">
        AI Content Classification
      </h1>
      <p class="text-slate-300 mt-2">
        Analisis teks dan gambar menggunakan model AI multimodal
      </p>
    </div>
  </div>

  <!-- MAIN -->
  <div class="max-w-6xl mx-auto p-6">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- LEFT PANEL -->
      <div class="bg-white rounded-3xl shadow-xl p-8">
        <h2 class="text-2xl font-bold text-slate-800 mb-6">
          Input Content
        </h2>
        <div class="mb-6">
          <label class="block text-sm font-semibold text-slate-700 mb-3">
            Task
          </label>

          <select
            id="task"
            class="
              w-full
              border
              border-slate-300
              rounded-2xl
              p-4
              text-slate-700
              outline-none
              focus:ring-4
              focus:ring-blue-200
              focus:border-blue-500
            "
          >
            <option value="IMG_CLASSIFICATION">
              Image Classification
            </option>

            <option value="TEXT_CLASSIFICATION">
              Text Classification
            </option>

            <option value="KEYWORD_EXTRACTION">
              Keyword Extraction
            </option>
          </select>
        </div>
        <!-- CONTENT -->
        <div class="mb-6">
          <label class="block text-sm font-semibold text-slate-700 mb-3">
            Content Text
          </label>
          <textarea
            id="content"
            placeholder="Masukkan teks yang ingin dianalisis..."
            class="
              w-full
              h-72
              border
              border-slate-300
              rounded-2xl
              p-5
              text-slate-700
              resize-none
              outline-none
              focus:ring-4
              focus:ring-blue-200
              focus:border-blue-500
              transition
            "
          ></textarea>
        </div>

        <!-- IMAGE -->
        <div class="mb-8">
          <label class="block text-sm font-semibold text-slate-700 mb-3">
            Upload Image
          </label>
          <label
            class="
              border-2
              border-dashed
              border-slate-300
              rounded-2xl
              p-8
              flex
              flex-col
              items-center
              justify-center
              cursor-pointer
              hover:border-blue-500
              hover:bg-blue-50
              transition
            "
          >

            <input
              type="file"
              id="image"
              accept="image/*"
              class="hidden"
            >

            <div class="text-5xl mb-3">
              🖼️
            </div>

            <p class="text-slate-700 font-medium">
              Klik untuk upload gambar
            </p>

            <p class="text-sm text-slate-500 mt-1">
              PNG, JPG, JPEG
            </p>

          </label>
          <!-- PREVIEW -->

          <div
            id="previewContainer"
            class="mt-5 hidden"
          >

            <img
              id="previewImage"
              class="
                rounded-2xl
                shadow-md
                max-h-72
                object-cover
              "
            >

          </div>

        </div>


        <!-- BUTTON -->
        <button
          onclick="classifyContent()"
          id="classifyButton"

          class="
            w-full
            bg-blue-600
            hover:bg-blue-700
            text-white
            font-semibold
            py-4
            rounded-2xl
            text-lg
            shadow-lg
            transition
            duration-200
          "

        >

          🔍 Klasifikasi Content

        </button>
        <button
          onclick="resetForm()"
          id="resetButton"
          class="
            w-full
            mt-3
            bg-slate-500
            hover:bg-slate-600
            text-white
            font-semibold
            py-4
            rounded-2xl
            text-lg
            shadow-lg
            transition
            duration-200
          "
        >
          🔄 Reset
        </button>
      </div>


      <!-- RIGHT PANEL -->

      <div class="bg-white rounded-3xl shadow-xl p-8">

        <div class="flex items-center justify-between">

          <h2 class="text-2xl font-bold text-slate-800">
            Hasil Analisis
          </h2>

          <div
            id="statusBadge"
            class="
              bg-slate-200
              text-slate-700
              px-4
              py-2
              rounded-full
              text-sm
              font-semibold
            "
          >

            Idle
          </div>
        </div>


        <!-- LOADING -->
        <div
          id="loading"
          class="hidden mt-10"
        >

          <div class="flex flex-col items-center">
            <div
              class="
                w-14
                h-14
                border-4
                border-blue-200
                border-t-blue-600
                rounded-full
                animate-spin
              "
            ></div>

            <p class="mt-5 text-slate-600 font-medium">
              Model sedang menganalisis...
            </p>
          </div>
        </div>


        <!-- RESULT -->
        <div
          id="resultSection"
          class="mt-8"
        >

          <!-- CATEGORY -->
          <div class="mb-6">
            <p class="text-sm font-semibold text-slate-500 mb-2">
              KATEGORI
            </p>

            <div
              id="kategori"
              class="
                bg-blue-50
                border
                border-blue-200
                rounded-2xl
                p-5
                text-blue-800
                text-lg
                font-bold
              "
            >
              Belum ada hasil
            </div>
          </div>

          <div class="mb-8">
            <p class="text-sm font-semibold text-slate-500 mb-2">
              CONFIDENCE
            </p>

            <div
              id="confidence"
              class="
                bg-slate-50
                border
                border-slate-200
                rounded-2xl
                p-4
                text-slate-700
                font-bold
              "
            >
              -
            </div>
          </div>

          <!-- REASONING -->
          <div>
            <p class="text-sm font-semibold text-slate-500 mb-2">
              REASONING
            </p>

            <div
              id="reasoning"

              class="
                bg-slate-50
                border
                border-slate-200
                rounded-2xl
                p-6
                text-slate-700
                leading-relaxed
                min-h-[250px]
                whitespace-pre-wrap
              "

            >

              Hasil reasoning model akan muncul di sini...
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>

    const imageInput =
      document.getElementById("image");

    const previewImage =
      document.getElementById("previewImage");

    const previewContainer =
      document.getElementById("previewContainer");


    // PREVIEW IMAGE
    let currentPreviewUrl = null;
    imageInput.addEventListener("change", () => {
      const file = imageInput.files[0];
      if (!file) return;

      if (currentPreviewUrl) {
        URL.revokeObjectURL(currentPreviewUrl);
      }
      currentPreviewUrl =
        URL.createObjectURL(file);

      previewImage.src =
        currentPreviewUrl;

      previewContainer.classList.remove("hidden");
    });

    function resetForm() {
      if (
        !confirm(
          "Yakin ingin menghapus semua input dan hasil?"
        )
      ) {
        return;
      }

      // reset task
      document.getElementById("task").selectedIndex = 0;

      // reset content
      document.getElementById("content").value = "";

      // reset image input
      imageInput.value = "";

      // reset preview image
      previewImage.src = "";

      previewContainer.classList.add("hidden");

      // release memory
      if (currentPreviewUrl) {
        URL.revokeObjectURL(currentPreviewUrl);
        currentPreviewUrl = null;
      }

      // reset hasil
      document.getElementById("kategori")
        .textContent = "Belum ada hasil";

      document.getElementById("reasoning")
        .textContent =
        "Hasil reasoning model akan muncul di sini...";

      document.getElementById("confidence")
        .textContent = "-";

      // reset status
      const statusBadge =
        document.getElementById("statusBadge");

      statusBadge.textContent = "Idle";

      statusBadge.className =
        `
        bg-slate-200
        text-slate-700
        px-4
        py-2
        rounded-full
        text-sm
        font-semibold
        `;

      // hide loading
      document
        .getElementById("loading")
        .classList.add("hidden");

      // enable button
      const button =
        document.getElementById("classifyButton");

      button.disabled = false;

      button.innerHTML =
        "🔍 Klasifikasi Content";
    }

    // CLASSIFY
    async function classifyContent(){
      const task =
        document.getElementById("task").value;
      const content =
        document.getElementById("content").value;

      const image =
        imageInput.files[0];

      const loading =
        document.getElementById("loading");

      const kategori =
        document.getElementById("kategori");

      const reasoning =
        document.getElementById("reasoning");

      const button =
        document.getElementById("classifyButton");

      const statusBadge =
        document.getElementById("statusBadge");

      loading.classList.remove("hidden");

      button.disabled = true;

      button.innerHTML =
        "Processing...";

      statusBadge.textContent =
        `Processing (${task})`;

      statusBadge.className =
        `
        bg-yellow-100
        text-yellow-700
        px-4
        py-2
        rounded-full
        text-sm
        font-semibold
        `;


      const formData = new FormData();
      formData.append("task", task);
      formData.append("content", content);
      if(image){
        formData.append("image", image);
      }


      try{

        const response = await fetch(

          "http://localhost:8080/AIKlasifikasi/backend/classify.php",

          {
            method:"POST",
            body:formData
          }
        );

        if (!response.ok) {
          throw new Error(
            `HTTP ${response.status}`
          );
        }
        const data = await response.json();

        kategori.textContent =
          data.kategori || "Unknown";

        reasoning.textContent =
          data.reasoning || "-";

        document.getElementById("confidence")
          .textContent =
          data.confidence || "-";


        statusBadge.textContent =
          "Success";

        statusBadge.className =
          `
          bg-green-100
          text-green-700
          px-4
          py-2
          rounded-full
          text-sm
          font-semibold
          `;

      }

      catch(error){

        console.error(error);

        kategori.textContent =
          "Error";

        reasoning.textContent =
          error.message ||
          "Gagal memanggil backend/API.";

        document.getElementById("confidence")
          .textContent = "-";

        statusBadge.textContent =
          "Error";

        statusBadge.className =
          `
          bg-red-100
          text-red-700
          px-4
          py-2
          rounded-full
          text-sm
          font-semibold
          `;
      }


      loading.classList.add("hidden");

      button.disabled = false;

      button.innerHTML =
        "Klasifikasi Content";
    }

  </script>

</body>
</html>
